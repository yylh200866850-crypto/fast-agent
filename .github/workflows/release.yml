name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: node18-win-x64
            artifact: fast-agent-win-x64.exe
          - os: macos-latest
            target: node18-macos-x64
            artifact: fast-agent-macos-x64
          - os: macos-latest
            target: node18-macos-arm64
            artifact: fast-agent-macos-arm64
          - os: ubuntu-latest
            target: node18-linux-x64
            artifact: fast-agent-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build with esbuild
        run: node scripts/build.mjs

      - name: Package executable
        run: |
          cd dist
          npx pkg interactive.cjs --targets ${{ matrix.target }} --compress GZip --output ../release/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
